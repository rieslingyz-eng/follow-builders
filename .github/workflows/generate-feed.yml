name: Generate Feeds

on:
  schedule:
    # All feeds (tweets, podcasts, blogs): once daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          set +e
          # 运行抓取脚本
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi
          # 回到根目录并强制宣告成功
          cd ..
          exit 0

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: update news feeds"
          git push

      - name: 推送 AI 新闻概要到飞书
        if: always()
        run: |
          # 提取抓取到的前 3 条新闻标题（假设脚本生成了 feed-blogs.json）
          NEWS_SUMMARY=$(node -e "
            try {
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('feed-blogs.json', 'utf8'));
              const items = data.items.slice(0, 3).map(i => '• ' + i.title).join('\\n');
              console.log(items || '暂无新资讯');
            } catch (e) {
              console.log('抓取成功，但内容格式正在解析中...');
            }
          ")

          curl -X POST -H "Content-Type: application/json" \
          -d "{
            \"msg_type\": \"post\",
            \"content\": {
              \"post\": {
                \"zh_cn\": {
                  \"title\": \"🚀 本次 AI 周报抓取完成\",
                  \"content\": [
                    [{\"tag\": \"text\", \"text\": \"最新动态摘要：\n$NEWS_SUMMARY\"}],
                    [{\"tag\": \"at\", \"user_id\": \"all\"}, {\"tag\": \"text\", \"text\": \" 更多详情请查看 GitHub 仓库。\"}]
                  ]
                }
              }
            }
          }" \
          ${{ secrets.FEISHU_WEBHOOK }}
