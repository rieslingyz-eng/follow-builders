name: Generate Feeds

on:
  schedule:
    # All feeds (tweets, podcasts, blogs): once daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          set +e
          # 运行抓取脚本
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi
          # 回到根目录并强制宣告成功
          cd ..
          exit 0

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: update news feeds"
          git push

      - name: 推送 AI 资讯详情到飞书
        if: always()
        run: |
          # 使用 Node 提取更详细的内容（标题 + 描述 + 链接）
          node -e "
            const fs = require('fs');
            try {
              // 优先读取博客类新闻
              const data = JSON.parse(fs.readFileSync('feed-blogs.json', 'utf8'));
              const newsList = data.items.slice(0, 3).map(item => {
                const title = item.title || '无标题';
                const summary = item.summary || item.description || '暂无详细描述';
                const link = item.url || '';
                return [
                  [{'tag': 'text', 'text': '📌 ' + title + '\n', 'style': ['bold']}],
                  [{'tag': 'text', 'text': summary + '\n'}],
                  [{'tag': 'a', 'text': '🔗 查看原文', 'href': link}, {'tag': 'text', 'text': '\n\n'}]
                ];
              });
              
              if (newsList.length === 0) throw new Error('Empty');
              
              // 构造飞书富文本
              const payload = {
                msg_type: 'post',
                content: {
                  post: {
                    zh_cn: {
                      title: '🚀 今日 AI 周报（精选）',
                      content: newsList.flat()
                    }
                  }
                }
              };
              fs.writeFileSync('payload.json', JSON.stringify(payload));
            } catch (e) {
              // 备选方案：如果 JSON 格式不对，发一条简单提示
              fs.writeFileSync('payload.json', JSON.stringify({
                msg_type: 'text',
                content: { text: '✅ 周报已更新至 GitHub，但自动提取详细内容失败，请检查仓库 JSON 文件格式。' }
              }));
            }
          "
          
          # 发送构造好的内容
          curl -X POST -H "Content-Type: application/json" \
          -d @payload.json \
          ${{ secrets.FEISHU_WEBHOOK }}
