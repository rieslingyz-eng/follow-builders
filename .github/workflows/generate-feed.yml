name: Generate Feeds

on:
  schedule:
    # All feeds (tweets, podcasts, blogs): once daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          cd scripts
          npm install
          # 运行抓取，即使失败也继续，防止流程卡死
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node generate-feed.js --${{ inputs.mode }} || echo "Scraper failed but continuing..."
          else
            node generate-feed.js || echo "Scraper failed but continuing..."
          fi
          cd ..

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: update news feeds"
          git push || echo "No changes to push"

      - name: 推送内容到飞书
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            // 尝试从两个可能的位置寻找文件
            const filePath = fs.existsSync('scripts/feed-blogs.json') ? 'scripts/feed-blogs.json' : 'feed-blogs.json';
            
            try {
              const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              if (!data.items || data.items.length === 0) throw new Error('Empty');
              
              const newsList = data.items.slice(0, 3).map(item => [
                [{'tag': 'text', 'text': '📌 ' + (item.title || 'AI 新动态') + '\n', 'style': ['bold']}],
                [{'tag': 'text', 'text': (item.summary || item.description || '点击查看详情').substring(0, 100) + '...\n'}],
                [{'tag': 'a', 'text': '🔗 查看原文', 'href': item.url || ''}, {'tag': 'text', 'text': '\n\n'}]
              ]).flat();

              const payload = {
                msg_type: 'post',
                content: { post: { zh_cn: { title: '🚀 今日 AI 精选资讯', content: newsList } } }
              };
              fs.writeFileSync('payload.json', JSON.stringify(payload));
            } catch (e) {
              fs.writeFileSync('payload.json', JSON.stringify({
                msg_type: 'text',
                content: { text: '⚠️ 抓取已完成，但未能获取到有效内容。请检查 GitHub Secrets 中的 API Key 是否配置正确。' }
              }));
            }
          "
          curl -X POST -H "Content-Type: application/json" -d @payload.json ${{ secrets.FEISHU_WEBHOOK }}
