name: Generate Feeds

on:
  schedule:
    # All feeds (tweets, podcasts, blogs): once daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          # 即使脚本运行失败（因为 X 的 Key 是假的），也允许继续执行后续步骤
          set +e 
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi
          
          # 无论上面是否报错，都强制返回成功，让流程走到“推送飞书”
          exit 0
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
      - name: 推送更新结果到飞书
        if: always() # 确保即使前面的 git push 没东西更新，也会执行推送
        run: |
          # 1. 提取最新的 AI 资讯（假设你想推送 feed-x.json 里的内容）
          # 我们用 tail 取最后几行，或者简单提示任务已完成
          echo "AI 行业资讯抓取完成！" > summary.txt
          echo "更新内容已同步至 GitHub 仓库。" >> summary.txt
          
          SUMMARY=$(cat summary.txt)
          
          # 2. 发送到飞书
          curl -X POST '${{ secrets.FEISHU_WEBHOOK }}' \
          -H 'Content-Type: application/json' \
          -d '{
            "msg_type": "text",
            "content": {
              "text": "✅ **AI 资讯同步成功**\n\n'"$SUMMARY"'\n\n查看详情：https://github.com/${{ github.repository }}"
            }
          }'
